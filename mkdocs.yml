site_name: TFG — Modelo de almacenamiento solar adaptativo
site_description: Memoria, código y validaciones del TFG de Carlos Molina Centeno (UCM)
site_author: Carlos Molina Centeno
repo_url: https://github.com/CarlosMolinaCenteno/tfg-solar-abm
repo_name: CarlosMolinaCenteno/tfg-solar-abm
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: es
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

nav:
  - Inicio: index.md
  - Memoria:
      - Índice: memoria/index.md
      - 1. Introducción: memoria/01-introduccion.md
      - 2. Motivación y antecedentes: memoria/02-motivacion.md
      - 3. Mercado eléctrico: memoria/03-mercado-electrico.md
      - 4. Modelo ABM: memoria/04-modelo-abm.md
      - 5. Implementación: memoria/05-implementacion.md
      - 6. Escenarios: memoria/06-escenarios.md
      - 7. Análisis económico: memoria/07-analisis-economico.md
      - 8. Conclusiones: memoria/08-conclusiones.md
      - Bibliografía: memoria/bibliografia.md
  - Anexos:
      - A. Agente único: anexos/a-agente-unico.md
      - B. Nash heterogéneo: anexos/b-nash-heterogeneo.md
  - Validación:
      - Índice: validacion/index.md
      - 00. Quickstart: validacion/00_quickstart.ipynb
      - 01. Validación de precios: validacion/01_validacion_precios.ipynb
      - 02. Validación del almacenamiento: validacion/02_validacion_almacenamiento.ipynb
      - 03. Validación del aprendizaje: validacion/03_validacion_aprendizaje.ipynb
      - 04. Coherencia temporal: validacion/04_coherencia_temporal.ipynb
      - 05. Reproducibilidad por semilla: validacion/05_reproducibilidad.ipynb
      - 06. Diagnóstico del aprendizaje: validacion/06_diagnostico_aprendizaje.ipynb
      - Banco de pruebas (teoría): validacion/banco_pruebas.ipynb
  - Extras:
      - Notas de aprendizaje: extras/notas-aprendizaje.md
      - Plan del banco de pruebas: extras/plan-banco-pruebas.md
      - Índice aprobado del TFG: extras/indice-aprobado.md
